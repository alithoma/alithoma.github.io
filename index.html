<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>micro:bit Web-BLE Controller</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background-color: #f5f5f5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.container {
  background-color: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  max-width: 450px;
  width: 100%;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
.header { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
h1 { color: #333; font-size: 24px; margin: 0; }
.subtitle { color: #666; font-size: 14px; margin: 0; }
.connection-section, .controls-section, .debug-section { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
.btn, .control-btn {
  padding: 14px 28px;
  background: #e0e0e0;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  user-select: none;
}
.btn:hover, .control-btn:hover { background: #d0d0d0; transform: translateY(-2px); }
.btn:active, .control-btn:active {
  transform: scale(0.95);
  background-color: #b0b0b0;
}
.btn:disabled, .control-btn:disabled { background: #f0f0f0; color: #a0a0a0; cursor: not-allowed; box-shadow: none; }
#connectBtn { background-color: #4CAF50; color: white; font-weight: bold; min-width: 200px; padding: 15px 30px; }
#connectBtn.connected { background-color: #f44336; }
.status {
  padding: 12px 20px;
  border-radius: 6px;
  font-weight: bold;
  width: 100%;
  max-width: 300px;
  font-size: 14px;
}
.status.connected { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
.status.disconnected { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
.status.scanning { background-color: #cce7ff; color: #004085; border: 1px solid #b3d7ff; }

/* Controls grid */
#controls {
  display: grid;
  grid-template-columns: repeat(3, 80px);
  grid-template-rows: repeat(3, 80px);
  gap: 10px;
  justify-items: center;
  align-items: center;
}
.control-btn { width: 90px; height: 80px; display: flex; justify-content: center; align-items: center; }

/* Servo buttons */
#servo-controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; width: 100%; max-width: 250px; }
#servo-controls button { width: 100%; padding: 14px 0; }

.debug { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 5px; padding: 12px; text-align: left; max-height: 120px; overflow-y: auto; font-family: monospace; font-size: 11px; width: 100%; }
.debug-title { font-weight: bold; margin-bottom: 5px; color: #495057; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Xpert Academy</h1>
    <p class="subtitle">micro:bit Web-BLE Controller</p>
  </div>

  <div class="connection-section">
    <button id="connectBtn" class="btn">Sambung</button>
    <div id="status" class="status disconnected">Tidak Terhubung - Klik 'Sambung' untuk menghubungkan</div>
  </div>

  <div class="controls-section">
    <div id="controls">
      <div></div>
      <button class="control-btn" data-char="a">Maju</button>
      <div></div>
      <button class="control-btn" data-char="b">Kiri</button>
      <div></div>
      <button class="control-btn" data-char="c">Kanan</button>
      <div></div>
      <button class="control-btn" data-char="d">Mundur</button>
      <div></div>
    </div>

    <div id="servo-controls">
      <button class="control-btn" data-char="f">Servo1a</button>
      <button class="control-btn" data-char="i">Servo2a</button>
      <button class="control-btn" data-char="g">Servo1b</button>
      <button class="control-btn" data-char="j">Servo2b</button>
    </div>
  </div>

  <div class="debug-section">
    <div class="debug-title">Log Debug:</div>
    <div class="debug"><div id="debugLog"></div></div>
  </div>
</div>

<script>
const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const UART_TX_CHARACTERISTIC_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
const UART_RX_CHARACTERISTIC_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

let uBitDevice = null, rxCharacteristic = null, txCharacteristic = null, isConnected = false;
let queue = Promise.resolve();

function queueGattOperation(operation){ queue = queue.then(operation, operation); return queue; }
function debugLog(message){
  const debugElement = document.getElementById('debugLog');
  const timestamp = new Date().toLocaleTimeString();
  debugElement.innerHTML += `[${timestamp}] ${message}<br>`;
  debugElement.scrollTop = debugElement.scrollHeight;
  console.log(message);
}

async function connect(){
  try{
    debugLog("Memulai koneksi BLE...");
    updateConnectionStatus('scanning');
    if(!navigator.bluetooth) throw new Error('Web Bluetooth tidak didukung.');
    uBitDevice = await navigator.bluetooth.requestDevice({
      filters:[{namePrefix:"BBC micro:bit"},{namePrefix:"micro:bit"}],
      optionalServices:[UART_SERVICE_UUID]
    });
    if(!uBitDevice) throw new Error('Tidak ada micro:bit yang ditemukan.');
    debugLog(`Perangkat ditemukan: ${uBitDevice.name}`);
    uBitDevice.addEventListener('gattserverdisconnected', onDisconnected);
    const server = await uBitDevice.gatt.connect();
    const service = await server.getPrimaryService(UART_SERVICE_UUID);
    rxCharacteristic = await service.getCharacteristic(UART_RX_CHARACTERISTIC_UUID);
    txCharacteristic = await service.getCharacteristic(UART_TX_CHARACTERISTIC_UUID);
    await txCharacteristic.startNotifications();
    txCharacteristic.addEventListener("characteristicvaluechanged", onTx);
    isConnected = true;
    updateConnectionStatus('connected');
    debugLog("BERHASIL TERHUBUNG ke micro:bit!");
  } catch(error){
    debugLog(`ERROR: ${error.message}`);
    updateConnectionStatus('disconnected');
    alert("Koneksi gagal: "+error.message);
  }
}

function disconnect(){
  if(uBitDevice?.gatt?.connected) uBitDevice.gatt.disconnect();
  isConnected = false; rxCharacteristic = null; txCharacteristic = null;
  updateConnectionStatus('disconnected'); debugLog("Terputus dari micro:bit");
}

function onDisconnected(){ disconnect(); }

function updateConnectionStatus(status){
  const connectBtn=document.getElementById("connectBtn");
  const statusDiv=document.getElementById("status");
  const controlBtns=document.querySelectorAll('.control-btn');
  switch(status){
    case 'connected':
      connectBtn.innerText="Putuskan";
      connectBtn.classList.add("connected");
      statusDiv.innerText=`Terhubung ke: ${uBitDevice?.name||'micro:bit'}`;
      statusDiv.className="status connected";
      controlBtns.forEach(btn=>btn.disabled=false);
      break;
    case 'disconnected':
      connectBtn.innerText="Sambung";
      connectBtn.classList.remove("connected");
      statusDiv.innerText="Tidak Terhubung - Klik 'Sambung' untuk menghubungkan";
      statusDiv.className="status disconnected";
      controlBtns.forEach(btn=>btn.disabled=true);
      break;
    case 'scanning':
      connectBtn.innerText="Mencari...";
      connectBtn.classList.remove("connected");
      statusDiv.innerText="Mencari micro:bit...";
      statusDiv.className="status scanning";
      controlBtns.forEach(btn=>btn.disabled=true);
      break;
  }
}

function onTx(event){
  let data = new Uint8Array(event.target.value.buffer);
  let text = String.fromCharCode(...data).trim();
  debugLog(`Diterima dari micro:bit: "${text}"`);
}

async function sendUART(text){
  if(!rxCharacteristic||!isConnected){ debugLog("Tidak terhubung ke micro:bit!"); return; }
  const data=new TextEncoder().encode(text+"#");
  try{ await queueGattOperation(()=>rxCharacteristic.writeValue(data)); debugLog(`Dikirim ke micro:bit: "${text}"`);}
  catch(error){ debugLog(`ERROR mengirim data: ${error}`);}
}

document.addEventListener('DOMContentLoaded', ()=>{
  debugLog("Aplikasi Web-BLE Controller dimuat");
  document.getElementById("connectBtn").onclick=()=>{ if(!isConnected) connect(); else disconnect(); };

  // Tombol arah
  document.querySelectorAll('#controls .control-btn').forEach(btn=>{
    btn.addEventListener('mousedown', ()=>sendUART(btn.dataset.char));
    btn.addEventListener('touchstart', e=>{e.preventDefault(); sendUART(btn.dataset.char);});
    btn.addEventListener('mouseup', ()=>sendUART('e'));
    btn.addEventListener('mouseleave', ()=>sendUART('e'));
    btn.addEventListener('touchend', ()=>sendUART('e'));
    btn.disabled=true;
    btn.addEventListener('contextmenu', e=>e.preventDefault());
  });

  // Tombol servo
  const servo1 = ['f','g'];
  const servo2 = ['i','j'];

  document.querySelectorAll('#servo-controls .control-btn').forEach(btn=>{
    btn.addEventListener('mousedown', ()=>sendUART(btn.dataset.char));
    btn.addEventListener('touchstart', e=>{ e.preventDefault(); sendUART(btn.dataset.char); });
    btn.addEventListener('mouseup', ()=>{ if(servo1.includes(btn.dataset.char)) sendUART('h'); if(servo2.includes(btn.dataset.char)) sendUART('k'); });
    btn.addEventListener('mouseleave', ()=>{ if(servo1.includes(btn.dataset.char)) sendUART('h'); if(servo2.includes(btn.dataset.char)) sendUART('k'); });
    btn.addEventListener('touchend', ()=>{ if(servo1.includes(btn.dataset.char)) sendUART('h'); if(servo2.includes(btn.dataset.char)) sendUART('k'); });
    btn.disabled=true;
    btn.addEventListener('contextmenu', e=>e.preventDefault());
  });
});
</script>
</body>
</html>
